{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.serviceAccountName" (dict "root" $ "service" $service) }}
  namespace: {{ include "platform.namespace" $ }}
  labels:
{{ include "platform.labels" (dict "root" $ "service" $service) | nindent 4 }}
  {{- with $service.serviceAccount.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
