apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.componentFullname" (dict "root" . "service" .Values.services.queryApi) }}
  namespace: {{ include "platform.namespace" . }}
  labels:
{{ include "platform.labels" (dict "root" . "service" .Values.services.queryApi) | nindent 4 }}
data:
  SERVICE_NAME: query-api
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  LOG_LEVEL: {{ default "info" .Values.global.logLevel | quote }}
  PORT: {{ printf "%v" .Values.services.queryApi.containerPort | quote }}
  DEFAULT_PAGE_SIZE: {{ printf "%v" .Values.services.queryApi.defaultPageSize | quote }}
  MAX_PAGE_SIZE: {{ printf "%v" .Values.services.queryApi.maxPageSize | quote }}
  HTTP_READ_TIMEOUT: {{ .Values.services.queryApi.timeouts.read | quote }}
  HTTP_WRITE_TIMEOUT: {{ .Values.services.queryApi.timeouts.write | quote }}
  HTTP_IDLE_TIMEOUT: {{ .Values.services.queryApi.timeouts.idle | quote }}
