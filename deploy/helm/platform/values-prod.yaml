global:
  environment: prod
  projectId: changeme-gcp-project-prod
  region: europe-west6
  namespace:
    create: true
    name: sap-integration-prod
  ingress:
    enabled: true
    className: gce
    annotations:
      kubernetes.io/ingress.allow-http: "false"
      kubernetes.io/ingress.global-static-ip-name: sap-integration-prod-ip
    hosts:
      - host: sap-mock-api.sap-integration.example.com
        paths:
          - path: /
            pathType: Prefix
            service: sapMockApi
      - host: ingestion-api.sap-integration.example.com
        paths:
          - path: /
            pathType: Prefix
            service: ingestionApi
      - host: query-api.sap-integration.example.com
        paths:
          - path: /
            pathType: Prefix
            service: queryApi
    tls:
      - secretName: sap-integration-prod-tls
        hosts:
          - sap-mock-api.sap-integration.example.com
          - ingestion-api.sap-integration.example.com
          - query-api.sap-integration.example.com
  kafka:
    bootstrapServers: kafka-bootstrap.shared-platform.svc.cluster.local:9092
    authMode: google_access_token
    tls:
      enabled: true
      insecureSkipVerify: false
      serverName: ""
      caCertFile: ""
    gcp:
      accessTokenScope: https://www.googleapis.com/auth/cloud-platform
  networkPolicy:
    enabled: true
    egressRules:
      - name: kafka
        cidr: 10.42.20.0/24
        ports:
          - 9092
      - name: postgres
        cidr: 10.42.30.0/24
        ports:
          - 5432

observability:
  enabled: false

services:
  sapMockApi:
    replicaCount: 2
    image:
      repository: europe-west6-docker.pkg.dev/changeme-gcp-project-prod/sap-integration/sap-mock-api
      tag: 1.0.0
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceAccount:
      name: sap-mock-api
      annotations:
        iam.gke.io/gcp-service-account: sap-mock-api-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
  ingestionApi:
    replicaCount: 3
    image:
      repository: europe-west6-docker.pkg.dev/changeme-gcp-project-prod/sap-integration/ingestion-api
      tag: 1.0.0
    kafkaPrincipalEmail: ingestion-api-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
    resources:
      requests:
        cpu: 300m
        memory: 384Mi
      limits:
        cpu: 1
        memory: 768Mi
    serviceAccount:
      name: ingestion-api
      annotations:
        iam.gke.io/gcp-service-account: ingestion-api-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 8
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
  eventProcessor:
    replicaCount: 2
    image:
      repository: europe-west6-docker.pkg.dev/changeme-gcp-project-prod/sap-integration/event-processor
      tag: 1.0.0
    kafkaPrincipalEmail: event-processor-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
    resources:
      requests:
        cpu: 400m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    serviceAccount:
      name: event-processor
      annotations:
        iam.gke.io/gcp-service-account: event-processor-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
    extraSecretEnv:
      - name: POSTGRES_URL
        secretName: sap-integration-postgres-prod
        secretKey: url
        optional: false
  queryApi:
    replicaCount: 3
    image:
      repository: europe-west6-docker.pkg.dev/changeme-gcp-project-prod/sap-integration/query-api
      tag: 1.0.0
    resources:
      requests:
        cpu: 250m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 768Mi
    serviceAccount:
      name: query-api
      annotations:
        iam.gke.io/gcp-service-account: query-api-prod@changeme-gcp-project-prod.iam.gserviceaccount.com
    extraSecretEnv:
      - name: POSTGRES_URL
        secretName: sap-integration-postgres-prod
        secretKey: url
        optional: false
