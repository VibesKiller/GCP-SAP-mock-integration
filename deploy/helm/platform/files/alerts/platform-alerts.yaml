groups:
  - name: sap-integration-platform
    rules:
      - alert: ServiceDown
        expr: up{job=~"sap-mock-api|ingestion-api|event-processor|query-api"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: A platform service is unreachable
          description: One of the platform services has not been scraped successfully for five minutes.

      - alert: IngestionApiErrorRateHigh
        expr: sum(rate(sap_integration_ingestion_api_requests_total{result=~"invalid|error"}[5m])) / clamp_min(sum(rate(sap_integration_ingestion_api_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Ingestion API error rate is above 5 percent
          description: More than 5 percent of ingestion requests are invalid or failing for ten minutes.

      - alert: KafkaPublishFailures
        expr: increase(sap_integration_ingestion_api_published_total{result="error"}[10m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kafka publish failures detected
          description: ingestion-api failed to publish at least one message to Kafka in the last ten minutes.

      - alert: EventProcessorRetrySpike
        expr: increase(sap_integration_event_processor_retries_total[15m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Event processor retry volume is elevated
          description: The event processor retried more than ten events in the last fifteen minutes.

      - alert: EventProcessorLatencyHigh
        expr: histogram_quantile(0.95, sum by (le, event_type) (rate(sap_integration_event_processor_processing_duration_seconds_bucket[10m]))) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Event processor p95 processing latency is high
          description: p95 event processing latency is above two seconds for at least ten minutes.

      - alert: DlqTrafficDetected
        expr: increase(sap_integration_event_processor_dlq_total[15m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Dead-letter traffic detected
          description: At least one message has been routed to the integration DLQ in the last fifteen minutes.

      - alert: QueryApiErrorRateHigh
        expr: sum(rate(sap_integration_query_api_requests_total{result="error"}[5m])) / clamp_min(sum(rate(sap_integration_query_api_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Query API error rate is above 5 percent
          description: More than 5 percent of query requests are failing for ten minutes.

      - alert: HighConsumerLag
        expr: max(kafka_consumergroup_lag{consumergroup="sap-integration.event-processor.v1"}) > 1000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Kafka consumer lag is above threshold
          description: Consumer lag is above 1000 records for more than ten minutes. This alert requires a Kafka exporter or managed Kafka lag metric integration.
