global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/platform-alerts.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: sap-mock-api
    static_configs:
      - targets: ['sap-mock-api:8080']

  - job_name: ingestion-api
    static_configs:
      - targets: ['ingestion-api:8081']

  - job_name: event-processor
    static_configs:
      - targets: ['event-processor:8082']

  - job_name: query-api
    static_configs:
      - targets: ['query-api:8083']
