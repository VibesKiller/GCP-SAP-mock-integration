---
name: terraform

'on':
  push:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

jobs:
  validate:
    name: terraform fmt and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init dev without backend
        run: terraform -chdir=terraform/envs/dev init -backend=false

      - name: Terraform validate dev
        run: terraform -chdir=terraform/envs/dev validate

      - name: Terraform init prod without backend
        run: terraform -chdir=terraform/envs/prod init -backend=false

      - name: Terraform validate prod
        run: terraform -chdir=terraform/envs/prod validate
