---
name: ci

'on':
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go lint test build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build

  docker-build:
    name: docker build smoke
    runs-on: ubuntu-latest
    needs: go
    strategy:
      fail-fast: false
      matrix:
        service:
          - sap-mock-api
          - ingestion-api
          - event-processor
          - query-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          tags: sap-integration/${{ matrix.service }}:${{ github.sha }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  helm:
    name: helm lint and render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: make helm-lint

      - name: Render base chart
        run: make helm-template

      - name: Render dev overlay
        run: make helm-template-dev

      - name: Render prod overlay
        run: make helm-template-prod

  terraform:
    name: terraform fmt validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init dev without backend
        run: terraform -chdir=terraform/envs/dev init -backend=false

      - name: Terraform validate dev
        run: terraform -chdir=terraform/envs/dev validate

      - name: Terraform init prod without backend
        run: terraform -chdir=terraform/envs/prod init -backend=false

      - name: Terraform validate prod
        run: terraform -chdir=terraform/envs/prod validate

  security-hygiene:
    name: repository secret hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check generated and local files are not tracked
        run: |
          set -euo pipefail
          forbidden='(^rendered\.yaml$|\.tfstate|\.tfvars$|backend\.hcl$'
          forbidden="${forbidden}|^\.env$|\.terraform/|kubeconfig"
          forbidden="${forbidden}|credentials\.json"
          forbidden="${forbidden}|service-account.*\.json|\.pem$|\.key$)"
          if git ls-files | grep -E "$forbidden"; then
            echo "Forbidden local or sensitive file is tracked" >&2
            exit 1
          fi

      - name: Scan for common secret patterns
        run: |
          set -euo pipefail
          sensitive_patterns='BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY'
          sensitive_patterns="${sensitive_patterns}|client_secret"
          sensitive_patterns="${sensitive_patterns}|refresh_token|id_token"
          sensitive_patterns="${sensitive_patterns}|ya29\."
          sensitive_patterns="${sensitive_patterns}|AIza[0-9A-Za-z_-]{20,}"
          if git grep -n -E "${sensitive_patterns}" -- . \
            ':!.github/workflows/ci.yml'; then
            echo "Potential sensitive value found in tracked files" >&2
            exit 1
          fi
