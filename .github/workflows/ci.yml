name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repository-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Run repository checks
        run: make check

      - name: Build Go packages
        run: make build
